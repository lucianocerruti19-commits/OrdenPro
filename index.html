<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Restaurante</title>
</head>

<body>

<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Entrar</button>

<div id="panel"></div>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabaseUrl = "https://uumzxwtlvvqnmiwbrjly.supabase.co"
const supabaseKey = "sb_publishable_2L9Pqyzr6vjBCaZX-MuF3g_vY3EPLsS"

const supabase = createClient(supabaseUrl, supabaseKey)

let perfilGlobal = null

// LOGIN
async function login(){
    const email = document.getElementById("email").value
    const password = document.getElementById("password").value

    const { data, error } = await supabase.auth.signInWithPassword({ email, password })

    if(error){
        console.log(error)
        alert(error.message)
        return
    }

    buscarPerfil(data.user.id)
}

// PERFIL
async function buscarPerfil(user_id){
    const { data, error } = await supabase
        .from("perfiles")
        .select("*")
        .eq("id", user_id)
        .single()

    if(error){
        alert("No se encontró perfil")
        return
    }

    perfilGlobal = data
    cargarPanel(data)
}

// PANEL
function cargarPanel(perfil){
    if(perfil.rol === "dueno"){
        panelAdmin()
    } else {
        cargarMesas()
    }
}

// MESAS
async function cargarMesas(){
    const { data } = await supabase
        .from("mesas")
        .select("*")
        .eq("empresa_id", perfilGlobal.empresa_id)

    const panel = document.getElementById("panel")
    panel.innerHTML = `<h2>Mesas</h2>`

    data.forEach(mesa => {
        let color = mesa.estado === "ocupada" ? "orange" : "lightgreen"

        panel.innerHTML += `
        <div onclick="abrirMesa('${mesa.id}')"
        style="background:${color}; padding:15px; margin:8px; border-radius:10px;">
            Mesa ${mesa.numero}
        </div>`
    })
}

// ABRIR MESA
async function abrirMesa(mesa_id){

    const { data: pedidosExistentes } = await supabase
        .from("pedidos")
        .select("*")
        .eq("mesa_id", mesa_id)
        .eq("estado", "abierto")
        .limit(1)

    let pedido = pedidosExistentes?.[0]

    if(!pedido){
        const { data } = await supabase
            .from("pedidos")
            .insert([{ mesa_id, empresa_id: perfilGlobal.empresa_id, estado: "abierto" }])
            .select()

        pedido = data[0]

        await supabase
            .from("mesas")
            .update({ estado: "ocupada" })
            .eq("id", mesa_id)
    }

    const { data: productos } = await supabase
        .from("productos")
        .select("*")
        .eq("empresa_id", perfilGlobal.empresa_id)

    const { data: items } = await supabase
        .from("pedido_items")
        .select("*, productos(nombre, precio, stock, costo)")
        .eq("pedido_id", pedido.id)

    renderPedido(pedido, productos, items)
}

// RENDER
function renderPedido(pedido, productos, items){

    const panel = document.getElementById("panel")
    panel.innerHTML = "<h2>Pedido</h2>"

    productos.forEach(prod => {
        panel.innerHTML += `
        <div onclick="agregarProducto('${pedido.id}','${prod.id}')"
        style="border:1px solid black; margin:5px; padding:10px;">
            ${prod.nombre} - $${prod.precio} (Stock ${prod.stock})
        </div>`
    })

    let total = 0

    items?.forEach(i => {
        total += i.productos.precio * i.cantidad
        panel.innerHTML += `<div>${i.productos.nombre} x${i.cantidad}</div>`
    })

    panel.innerHTML += `<h3>Total: $${total}</h3>`

    panel.innerHTML += `
    <button onclick="cerrarPedido('${pedido.id}','${pedido.mesa_id}')">Cerrar</button>
    <button onclick="cargarMesas()">Volver</button>`
}

// AGREGAR PRODUCTO
async function agregarProducto(pedido_id, producto_id){

    const { data: prod } = await supabase
        .from("productos")
        .select("*")
        .eq("id", producto_id)
        .single()

    if(prod.stock <= 0){
        alert("Sin stock")
        return
    }

    await supabase.from("pedido_items").insert([{ pedido_id, producto_id, cantidad: 1 }])

    await supabase
        .from("productos")
        .update({ stock: prod.stock - 1 })
        .eq("id", producto_id)

    abrirMesaPorPedido(pedido_id)
}

// REFRESCAR
async function abrirMesaPorPedido(pedido_id){
    const { data } = await supabase.from("pedidos").select("*").eq("id", pedido_id).single()
    abrirMesa(data.mesa_id)
}

// CERRAR
async function cerrarPedido(pedido_id, mesa_id){

    const { data: items } = await supabase
        .from("pedido_items")
        .select("*, productos(precio)")
        .eq("pedido_id", pedido_id)

    let total = 0
    items.forEach(i => total += i.productos.precio * i.cantidad)

    await supabase.from("pedidos")
        .update({ estado: "cerrado", total })
        .eq("id", pedido_id)

    await supabase.from("mesas")
        .update({ estado: "libre" })
        .eq("id", mesa_id)

    alert("Pedido cerrado $" + total)
    cargarMesas()
}

// ADMIN PRO
async function panelAdmin(){

    const { data: pedidos } = await supabase
        .from("pedidos")
        .select("*, pedido_items(*, productos(precio, costo))")
        .eq("empresa_id", perfilGlobal.empresa_id)
        .eq("estado", "cerrado")

    let ventas = 0
    let costos = 0

    pedidos.forEach(p => {
        p.pedido_items?.forEach(i => {
            ventas += i.productos.precio * i.cantidad
            costos += (i.productos.costo || 0) * i.cantidad
        })
    })

    const panel = document.getElementById("panel")

    panel.innerHTML = `
    <h1>Admin</h1>
    <h2>Ventas: $${ventas}</h2>
    <h2>Costos: $${costos}</h2>
    <h2>Ganancia: $${ventas - costos}</h2>
    <button onclick="cargarMesas()">Ir al POS</button>`
}

// GLOBAL
window.login = login
window.abrirMesa = abrirMesa
window.agregarProducto = agregarProducto
window.cerrarPedido = cerrarPedido
window.cargarMesas = cargarMesas

</script>

</body>
</html>
