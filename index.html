<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Restaurante</title>
</head>

<body>

<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Entrar</button>

<div id="panel"></div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabaseUrl = "https://uumzxwtlvvqnmiwbrjly.supabase.co"
const supabaseKey = "sb_publishable_2L9Pqyzr6vjBCaZX-MuF3g_vY3EPLsS"

const supabase = createClient(supabaseUrl, supabaseKey)

let perfilGlobal = null

async function login(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const { data, error } = await supabase.auth.signInWithPassword({
email: email,
password: password
})

if(error){
alert(error.message)
return
}

const user = data.user

buscarPerfil(user.id)

}

async function buscarPerfil(user_id){

const { data, error } = await supabase
.from("perfiles")
.select("*")
.eq("id", user_id)
.single()

if(error){
alert("No se encontró perfil")
return
}

perfilGlobal = data

cargarPanel(data)

}

// 🔥 cargar mesas SOLO de su empresa
async function cargarMesas(){

const { data, error } = await supabase
.from("mesas")
.select("*")
.eq("empresa_id", perfilGlobal.empresa_id)
.order("numero", { ascending: true })

if(error){
alert("Error cargando mesas")
return
}

const panel = document.getElementById("panel")

panel.innerHTML = `<h1>Bienvenido ${perfilGlobal.nombre}</h1><h2>Mesas</h2>`

data.forEach(mesa => {

let color = "lightgreen"

if(mesa.estado === "ocupada") color = "orange"
if(mesa.estado === "esperando_comida") color = "red"
if(mesa.estado === "pagando") color = "gray"

panel.innerHTML += `
<div onclick="abrirMesa('${mesa.id}')" 
style="
background:${color};
padding:15px;
margin:8px;
border-radius:10px;
font-size:18px;
">
Mesa ${mesa.numero} - ${mesa.estado}
</div>
`

})

}

// 🔥 crear pedido al tocar mesa
async function abrirMesa(mesa_id){

const { data, error } = await supabase
.from("pedidos")
.insert([
{
mesa_id: mesa_id,
empresa_id: perfilGlobal.empresa_id
}
])

if(error){
alert("Error creando pedido")
return
}

alert("Pedido creado correctamente")

}

// 🔥 panel por rol
function cargarPanel(perfil){

if(perfil.rol === "dueno"){
cargarMesas()
}

if(perfil.rol === "mozo"){
cargarMesas()
}

if(perfil.rol === "cocina"){
document.getElementById("panel").innerHTML = "<h1>Pantalla Cocina</h1>"
}

}

// necesario para botones
window.login = login
window.abrirMesa = abrirMesa

</script>

</body>
</html>
