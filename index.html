<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Restaurante</title>
</head>

<body>

<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Entrar</button>

<div id="panel"></div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabaseUrl = "https://uumzxwtlvvqnmiwbrjly.supabase.co"
const supabaseKey = "sb_publishable_2L9Pqyzr6vjBCaZX-MuF3g_vY3EPLsS"

const supabase = createClient(supabaseUrl, supabaseKey)

let perfilGlobal = null

// LOGIN
async function login(){
const email = document.getElementById("email").value
const password = document.getElementById("password").value

const { data, error } = await supabase.auth.signInWithPassword({
email, password
})

if(error){
alert(error.message)
return
}

buscarPerfil(data.user.id)
}

// PERFIL
async function buscarPerfil(user_id){

const { data, error } = await supabase
.from("perfiles")
.select("*")
.eq("id", user_id)
.single()

if(error){
alert("No se encontró perfil")
return
}

perfilGlobal = data
cargarPanel(data)
}

// MESAS
async function cargarMesas(){

const { data } = await supabase
.from("mesas")
.select("*")
.eq("empresa_id", perfilGlobal.empresa_id)
.order("numero", { ascending: true })

const panel = document.getElementById("panel")

panel.innerHTML = `<h1>Bienvenido ${perfilGlobal.nombre}</h1><h2>Mesas</h2>`

data.forEach(mesa => {

let color = "lightgreen"

if(mesa.estado === "ocupada") color = "orange"

panel.innerHTML += `
<div onclick="abrirMesa('${mesa.id}')" 
style="background:${color}; padding:15px; margin:8px; border-radius:10px;">
Mesa ${mesa.numero}
</div>
`

})
}

// 🔥 FUNCIÓN PRO (NO CREA PEDIDO SI YA EXISTE)
async function abrirMesa(mesa_id){

// buscar pedido abierto
const { data: pedidosExistentes } = await supabase
.from("pedidos")
.select("*")
.eq("mesa_id", mesa_id)
.eq("estado", "abierto")
.limit(1)

let pedido = null

if(pedidosExistentes.length > 0){
pedido = pedidosExistentes[0]
}else{

const { data } = await supabase
.from("pedidos")
.insert([
{
mesa_id,
empresa_id: perfilGlobal.empresa_id
}
])
.select()

pedido = data[0]

}

// productos
const { data: productos } = await supabase
.from("productos")
.select("*")
.eq("empresa_id", perfilGlobal.empresa_id)

// items actuales
const { data: items } = await supabase
.from("pedido_items")
.select("*, productos(nombre, precio)")
.eq("pedido_id", pedido.id)

const panel = document.getElementById("panel")

panel.innerHTML = "<h2>Pedido</h2>"

// productos
panel.innerHTML += "<h3>Agregar productos</h3>"

productos.forEach(prod => {
panel.innerHTML += `
<div onclick="agregarProducto('${pedido.id}', '${prod.id}')"
style="border:1px solid black; padding:10px; margin:5px;">
${prod.nombre} - $${prod.precio}
</div>
`
})

// cuenta
let total = 0

panel.innerHTML += "<h3>Cuenta</h3>"

items?.forEach(item => {
const subtotal = item.productos.precio * item.cantidad
total += subtotal

panel.innerHTML += `
<div>
${item.productos.nombre} x${item.cantidad} = $${subtotal}
</div>
`
})

panel.innerHTML += `<h2>Total: $${total}</h2>`

panel.innerHTML += `
<button onclick="cerrarPedido('${pedido.id}')">Cerrar pedido</button>
<br><br>
<button onclick="cargarMesas()">Volver</button>
`

}

// agregar producto (recarga mesa correctamente)
async function agregarProducto(pedido_id, producto_id){

await supabase.from("pedido_items").insert([
{ pedido_id, producto_id, cantidad: 1 }
])

abrirMesaPorPedido(pedido_id)
}

// 🔥 refrescar misma mesa (clave)
async function abrirMesaPorPedido(pedido_id){

const { data: pedido } = await supabase
.from("pedidos")
.select("*")
.eq("id", pedido_id)
.single()

abrirMesa(pedido.mesa_id)
}

// cerrar pedido
async function cerrarPedido(pedido_id){

await supabase
.from("pedidos")
.update({ estado: "cerrado" })
.eq("id", pedido_id)

alert("Pedido cerrado")
cargarMesas()

}

// panel
function cargarPanel(perfil){
cargarMesas()
}

// global
window.login = login
window.abrirMesa = abrirMesa
window.agregarProducto = agregarProducto
window.cerrarPedido = cerrarPedido

</script>

</body>
</html>
