<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TuSistema POS</title>
</head>
<body>

<h1>Login</h1>

<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Contraseña">
<button id="loginBtn">Entrar</button>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

  const supabaseUrl = "https://uumzxwtlvvqnmiwbrjly.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1bXp4d3RsdnZxbm1pd2Jyamx5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0Nzc4MTUsImV4cCI6MjA4ODA1MzgxNX0.xtx6j1cuQr5Oqvgn4woKRpnKyKg-VaH2V7Zm8qghkUM";

  const supabase = createClient(supabaseUrl, supabaseKey);

  document.getElementById("loginBtn").addEventListener("click", async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await supabase.auth.signInWithPassword({
      email,
      password,
    });

    if (error) {
      alert("Error: " + error.message);
    } else {
      alert("Login exitoso 🚀");
      console.log(data);
    }
  });
</script>

</body>
</html>
