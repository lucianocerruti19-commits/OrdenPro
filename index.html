<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>POS</title>
</head>

<body>

<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button id="btnLogin">Entrar</button>

<div id="panel"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(
  "https://uumzxwtlvvqnmiwbrjly.supabase.co",
  "sb_publishable_2L9Pqyzr6vjBCaZX-MuF3g_vY3EPLsS"
)

// LOGIN
async function login(){

    const email = document.getElementById("email").value
    const password = document.getElementById("password").value

    alert("Intentando login...") // 👈 DEBUG

    const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
    })

    if(error){
        alert(error.message)
        return
    }

    alert("Login OK")

    buscarPerfil(data.user.id)
}

// PERFIL
async function buscarPerfil(user_id){

    const { data, error } = await supabase
        .from("perfiles")
        .select("*")
        .eq("id", user_id)
        .single()

    if(error){
        alert("No se encontró perfil")
        return
    }

    document.getElementById("panel").innerHTML =
        "<h1>Bienvenido " + data.nombre + "</h1>"

}

// EVENTO BOTÓN
document.getElementById("btnLogin").addEventListener("click", login)

</script>

</body>
</html>
