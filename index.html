<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Restaurante</title>
</head>

<body>

<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Entrar</button>

<div id="panel"></div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabaseUrl = "https://uumzxwtlvvqnmiwbrjly.supabase.co"
const supabaseKey = "sb_publishable_2L9Pqyzr6vjBCaZX-MuF3g_vY3EPLsS"

const supabase = createClient(supabaseUrl, supabaseKey)

let perfilGlobal = null

// LOGIN
async function login(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const { data, error } = await supabase.auth.signInWithPassword({
email,
password
})

if(error){
alert(error.message)
return
}

buscarPerfil(data.user.id)
}

// PERFIL
async function buscarPerfil(user_id){

const { data, error } = await supabase
.from("perfiles")
.select("*")
.eq("id", user_id)
.single()

if(error){
alert("No se encontró perfil")
return
}

perfilGlobal = data
cargarPanel(data)
}

// MESAS
async function cargarMesas(){

const { data, error } = await supabase
.from("mesas")
.select("*")
.eq("empresa_id", perfilGlobal.empresa_id)
.order("numero", { ascending: true })

if(error){
alert("Error cargando mesas")
return
}

const panel = document.getElementById("panel")

panel.innerHTML = `<h1>Bienvenido ${perfilGlobal.nombre}</h1><h2>Mesas</h2>`

data.forEach(mesa => {

let color = "lightgreen"

if(mesa.estado === "ocupada") color = "orange"
if(mesa.estado === "esperando_comida") color = "red"
if(mesa.estado === "pagando") color = "gray"

panel.innerHTML += `
<div onclick="abrirMesa('${mesa.id}')" 
style="
background:${color};
padding:15px;
margin:8px;
border-radius:10px;
font-size:18px;
">
Mesa ${mesa.numero} - ${mesa.estado}
</div>
`

})
}

// ABRIR MESA → CREAR PEDIDO + MOSTRAR PRODUCTOS
async function abrirMesa(mesa_id){

// crear pedido
const { data, error } = await supabase
.from("pedidos")
.insert([
{
mesa_id,
empresa_id: perfilGlobal.empresa_id
}
])
.select()

if(error){
alert("Error creando pedido")
return
}

const pedido = data[0]

// traer productos
const { data: productos, error: errorProd } = await supabase
.from("productos")
.select("*")
.eq("empresa_id", perfilGlobal.empresa_id)

if(errorProd){
alert("Error cargando productos")
return
}

const panel = document.getElementById("panel")

panel.innerHTML = "<h2>Agregar productos</h2>"

// mostrar productos
productos.forEach(prod => {

panel.innerHTML += `
<div onclick="agregarProducto('${pedido.id}', '${prod.id}')"
style="
border:1px solid black;
padding:10px;
margin:5px;
border-radius:8px;
">
${prod.nombre} - $${prod.precio}
</div>
`

})

}

// AGREGAR PRODUCTO
async function agregarProducto(pedido_id, producto_id){

const { error } = await supabase
.from("pedido_items")
.insert([
{
pedido_id,
producto_id,
cantidad: 1
}
])

if(error){
alert("Error agregando producto")
return
}

alert("Producto agregado")

}

// PANEL POR ROL
function cargarPanel(perfil){

if(perfil.rol === "dueno"){
cargarMesas()
}

if(perfil.rol === "mozo"){
cargarMesas()
}

if(perfil.rol === "cocina"){
document.getElementById("panel").innerHTML = "<h1>Pantalla Cocina</h1>"
}

}

// GLOBAL
window.login = login
window.abrirMesa = abrirMesa
window.agregarProducto = agregarProducto

</script>

</body>
</html>
