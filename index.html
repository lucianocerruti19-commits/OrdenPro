<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Restaurante</title>
</head>

<body>

<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Entrar</button>

<div id="panel"></div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const supabaseUrl = "https://uumzxwtlvvqnmiwbrjly.supabase.co"
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1bXp4d3RsdnZxbm1pd2Jyamx5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0Nzc4MTUsImV4cCI6MjA4ODA1MzgxNX0.xtx6j1cuQr5Oqvgn4woKRpnKyKg-VaH2V7Zm8qghkUM";

const supabase = createClient(supabaseUrl, supabaseKey)

async function login(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const { data, error } = await supabase.auth.signInWithPassword({
email: email,
password: password
})

if(error){
alert("Error login")
return
}

const user = data.user

buscarPerfil(user.id)

}

async function buscarPerfil(user_id){

const { data, error } = await supabase
.from("perfiles")
.select("*")
.eq("id", user_id)
.single()

if(error){
alert("No se encontró perfil")
return
}

cargarPanel(data)

}

function cargarPanel(perfil){

const panel = document.getElementById("panel")

if(perfil.rol === "dueno"){

panel.innerHTML = "<h1>Panel Dueño</h1><p>Bienvenido " + perfil.nombre + "</p>"

}

if(perfil.rol === "mozo"){

panel.innerHTML = "<h1>Panel Mozo</h1>"

}

if(perfil.rol === "cocina"){

panel.innerHTML = "<h1>Panel Cocina</h1>"

}

}

</script>

</body>
</html>
